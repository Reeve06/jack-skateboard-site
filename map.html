<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkateMates | Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 3D Skateboard Navigation -->
  <div class="nav-perspective">
    <div class="skateboard" id="skateboard-nav">
      
      <!-- Front (Grip Tape) -->
      <div class="skate-face skate-front">
        <div class="skate-truck top-truck"></div>
        <div class="skate-content">
          <a href="index.html" class="nav-link">Home</a>
          <a href="map.html" class="nav-link active">Spots Map</a>
          <a href="about.html" class="nav-link">About</a>
          <a href="about.html#contact" class="nav-link">Contact</a>
        </div>
        <button class="flip-btn" onclick="flipSkateboard()">↺ Flip</button>
        <div class="skate-truck bottom-truck"></div>
      </div>

      <!-- Back (Deck Graphic) -->
      <div class="skate-face skate-back">
        <div class="skate-truck top-truck">
            <div class="wheels"></div>
        </div>
        <div class="skate-content deck-graphic">
          <h2>SKATE<span>MATES</span></h2>
          <div class="deck-links">
            <a href="https://www.instagram.com/" target="_blank" onclick="window.open(this.href, '_blank'); return false;" class="nav-link secondary-btn" style="z-index: 20; position: relative;">Instagram</a>
            <a href="https://www.youtube.com/" target="_blank" onclick="window.open(this.href, '_blank'); return false;" class="nav-link secondary-btn" style="z-index: 20; position: relative;">YouTube</a>
            <a href="https://www.tiktok.com/@skate..mates.co?_r=1&amp;_t=ZN-9858gOOPg50" target="_blank" onclick="window.open(this.href, '_blank'); return false;" class="nav-link secondary-btn" style="z-index: 20; position: relative;">TikTok</a>
          </div>
        </div>
        <button class="flip-btn" onclick="flipSkateboard()">↻ Flip</button>
        <div class="skate-truck bottom-truck">
            <div class="wheels"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- MAP SECTION -->
  <section id="map-section" class="section">
    <div class="container map-container">
      <div class="map-header">
        <h2>SKATE MATES <span>MAP</span></h2>
        <p>Find the sickest skateparks, street spots, and DIYs near you.</p>
      </div>

      <div class="map-wrapper glass-panel">
        <div id="map"></div>
        <div id="hint" class="glass-badge hidden">Click on the map to add a new spot</div>
        <div class="map-filters">
            <button class="filter-btn active" data-filter="All">All</button>
            <button class="filter-btn" data-filter="Skatepark">Skatepark</button>
            <button class="filter-btn" data-filter="Street">Street</button>
            <button class="filter-btn" data-filter="Bowl">Bowl</button>
            <button class="filter-btn" data-filter="DIY">DIY</button>
            <button class="filter-btn" data-filter="Hidden Gem">Hidden Gem</button>
            <!-- Add a script tag below if you want more options, currently covers the main ones! -->
            <button id="addModeBtn" class="filter-btn add-btn">+ Add Spot</button>
        </div>
      </div>
    </div>
  </section>

  <!-- Add Spot Modal -->
  <div id="add-spot-modal" class="modal glass-panel hidden">
    <div class="panel-header">
      <h3>Add New Spot</h3>
      <div class="skateboard-icon">🛹</div>
    </div>
    <div class="input-group">
      <label for="spotTitle">Spot Name</label>
      <input id="spotTitle" placeholder="E.g., Downtown Ledges" />
    </div>
    <div class="input-group">
      <label for="spotCategory">Category</label>
      <select id="spotCategory">
        <option value="Skatepark">Skatepark</option>
        <option value="Street">Street</option>
        <option value="Bowl">Bowl</option>
        <option value="DIY">DIY</option>
        <option value="Hidden Gem">Hidden Gem</option>
        <option value="Mega Ramp">Mega Ramp</option>
        <option value="Stair Set">Stair Set</option>
        <option value="Handrail">Handrail</option>
      </select>
    </div>
    <div class="input-group">
      <label for="spotDescription">Description</label>
      <textarea id="spotDescription" placeholder="Smooth ground, 3 stair set..."></textarea>
    </div>
    <div class="panel-actions">
      <button onclick="submitSpot()" class="btn-primary">Submit Spot</button>
      <button onclick="cancelSpot()" class="btn-secondary">Cancel</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
  <!-- Firebase Scripts (Modular API) - Preparing for user config -->
  <script type="module" src="script.js"></script>
</body>
</html>
