<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jack Skateboard | Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 3D Skateboard Navigation -->
  <div class="nav-perspective">
    <div class="skateboard" id="skateboard-nav">
      
      <!-- Front (Grip Tape) -->
      <div class="skate-face skate-front">
        <div class="skate-truck top-truck"></div>
        <div class="skate-content">
          <a href="index.html" class="nav-link">Home</a>
          <a href="map.html" class="nav-link">Spots Map</a>
          <a href="about.html" class="nav-link">About</a>
          <a href="contact.html" class="nav-link active">Contact</a>
        </div>
        <button class="flip-btn" onclick="flipSkateboard()">↺ Flip</button>
        <div class="skate-truck bottom-truck"></div>
      </div>

      <!-- Back (Deck Graphic) -->
      <div class="skate-face skate-back">
        <div class="skate-truck top-truck">
            <div class="wheels"></div>
        </div>
        <div class="skate-content deck-graphic">
          <h2>JACK <span>SKATEBOARD</span></h2>
          <div class="deck-links">
            <a href="https://instagram.com" target="_blank" class="nav-link secondary-btn">Instagram</a>
            <a href="https://youtube.com" target="_blank" class="nav-link secondary-btn">YouTube</a>
          </div>
        </div>
        <button class="flip-btn" onclick="flipSkateboard()">↻ Flip</button>
        <div class="skate-truck bottom-truck">
            <div class="wheels"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- CONTACT SECTION -->
  <section id="contact" class="section">
    <div class="container contact-container">
      <h2>HIT US <span>UP</span></h2>
      <form class="glass-panel contact-form" onsubmit="event.preventDefault(); alert('Message sent!');">
        <div class="input-group">
          <label>Your Name</label>
          <input type="text" placeholder="Tony Hawk" required />
        </div>
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" placeholder="tony@birdhouse.com" required />
        </div>
        <div class="input-group">
          <label>Message</label>
          <textarea placeholder="Yo, love the site..." required></textarea>
        </div>
        <button type="submit" class="btn-primary w-full">Send Message</button>
      </form>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
